<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Готварска книга</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Slab:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FCF8F8;
  --bg-card: #FFFFFF;
  --bg-soft: #F7ECEE;
  --ink: #251A1F;
  --ink-soft: #5C4750;
  --ink-muted: #8B7780;
  --accent: #C2456A;
  --accent-hover: #9C2F50;
  --accent-soft: #FBDDE4;
  --accent-line: #E8B0C1;
  --pop: #E8924E;
  --pop-soft: #FBE5D2;
  --rule: #ECE0E3;
  --rule-soft: #F4EBEE;
  --warm: #E07856;
  --warm-soft: #FCE4DC;
  --honey: #D9A441;
  --honey-soft: #FBEED2;
  --berry: #C2456A;
  --berry-soft: #FBDDE4;
  --ocean: #4A8B9C;
  --ocean-soft: #DCEAEF;
  --sage: #4A7C59;
  --sage-soft: #DDEBE0;
  --shadow-soft: 0 1px 2px rgba(120,40,70,0.04), 0 4px 16px rgba(120,40,70,0.05);
  --shadow-card: 0 2px 6px rgba(120,40,70,0.06), 0 12px 28px rgba(120,40,70,0.07);
  --font-display: 'Roboto Slab', Georgia, serif;
  --font-body: 'Roboto', -apple-system, sans-serif;
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 18px;
  --r-xl: 24px;
}
:root[data-theme="dark"] {
  --bg: #1A0E13;
  --bg-card: #251820;
  --bg-soft: #2D1F26;
  --ink: #F5ECEF;
  --ink-soft: #C9B4BC;
  --ink-muted: #8B7782;
  --accent: #E875A0;
  --accent-hover: #F08DB2;
  --accent-soft: #3A1A26;
  --accent-line: #582336;
  --pop: #F0A464;
  --pop-soft: #3A2515;
  --rule: #34222A;
  --rule-soft: #281A20;
  --warm: #F0936F;
  --warm-soft: #3D241B;
  --honey: #E8B85A;
  --honey-soft: #3A2D14;
  --berry: #E875A0;
  --berry-soft: #3A1A26;
  --ocean: #6FB0C2;
  --ocean-soft: #1B2D33;
  --sage: #7BC480;
  --sage-soft: #1F3826;
  --shadow-soft: 0 1px 2px rgba(0,0,0,0.25), 0 4px 16px rgba(0,0,0,0.2);
  --shadow-card: 0 2px 6px rgba(0,0,0,0.35), 0 12px 28px rgba(0,0,0,0.25);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink);
  line-height: 1.5;
  font-size: 15px;
  min-height: 100vh;
  padding-bottom: 100px;
  transition: background 0.3s, color 0.3s;
}

/* HEADER */
.masthead {
  background: var(--bg);
  border-bottom: 1px solid var(--rule);
  padding: 22px 22px 16px;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(12px);
  background: color-mix(in srgb, var(--bg) 88%, transparent);
}
.masthead-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}
.brand {
  display: flex;
  align-items: baseline;
  gap: 14px;
  flex-wrap: wrap;
}
.brand-title {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 28px;
  letter-spacing: -0.025em;
  color: var(--ink);
  line-height: 1;
}
.brand-title em {
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
}
.brand-sub {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--ink-muted);
  font-weight: 600;
}
.masthead-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}
.icon-btn {
  width: 40px;
  height: 40px;
  border-radius: var(--r-md);
  background: var(--bg-card);
  border: 1px solid var(--rule);
  color: var(--ink-soft);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
  font-family: inherit;
  position: relative;
}
.icon-btn:hover {
  background: var(--accent-soft);
  color: var(--accent);
  border-color: var(--accent-line);
  transform: translateY(-1px);
}
.icon-btn.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
  box-shadow: 0 2px 6px rgba(180,55,90,0.2);
}
.icon-btn .badge {
  position: absolute;
  top: -5px; right: -5px;
  background: var(--pop);
  color: var(--ink);
  font-size: 10px;
  font-weight: 800;
  min-width: 18px;
  height: 18px;
  border-radius: 9px;
  padding: 0 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--bg);
}

/* SEARCH */
.search-bar {
  max-width: 1280px;
  margin: 0 auto;
  padding: 14px 22px 0;
}
.search-row {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}
.search-input-wrap {
  flex: 1 1 280px;
  position: relative;
}
.search-input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: var(--r-md);
  padding: 12px 14px 12px 42px;
  font-size: 15px;
  font-family: inherit;
  color: var(--ink);
  transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
}
.search-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-soft);
}
.search-input::placeholder { color: var(--ink-muted); }
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-muted);
  pointer-events: none;
  font-size: 17px;
}

/* MAIN LAYOUT */
.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 16px 20px;
}

/* HERO STRIP */
.hero {
  margin: 8px 0 28px;
  padding: 32px 32px 28px;
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: var(--r-xl);
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-soft);
}
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 88% 10%, var(--pop-soft) 0%, transparent 45%),
    radial-gradient(circle at 12% 95%, var(--accent-soft) 0%, transparent 50%);
  pointer-events: none;
  opacity: 0.8;
}
:root[data-theme="dark"] .hero::before {
  opacity: 0.45;
}
.hero::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 4px;
  background: linear-gradient(90deg,
    var(--accent) 0%,
    var(--pop) 25%,
    var(--honey) 50%,
    var(--warm) 75%,
    var(--berry) 100%);
}
.hero-inner { position: relative; }
.hero-eyebrow {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 14px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.hero-eyebrow::before {
  content: "";
  width: 24px;
  height: 2px;
  background: var(--pop);
  display: inline-block;
}
.hero-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(30px, 4.8vw, 48px);
  line-height: 1.02;
  letter-spacing: -0.025em;
  color: var(--ink);
  margin-bottom: 10px;
}
.hero-title em {
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
}
.hero-meta {
  font-size: 14px;
  color: var(--ink-soft);
  margin-bottom: 20px;
  max-width: 540px;
  line-height: 1.55;
}
.hero-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
.btn-primary, .btn-secondary {
  padding: 11px 20px;
  border-radius: var(--r-md);
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  letter-spacing: -0.005em;
}
.btn-primary {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
  box-shadow: 0 2px 4px rgba(180,55,90,0.15);
}
.btn-primary:hover {
  background: var(--accent-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(180,55,90,0.2);
}
.btn-secondary {
  background: var(--bg-card);
  color: var(--ink);
  border-color: var(--rule);
}
.btn-secondary:hover {
  background: var(--bg-soft);
  border-color: var(--accent-line);
  color: var(--accent);
}

/* FILTERS */
.filters-section {
  margin: 0 0 24px;
}
.filter-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--ink-muted);
  font-weight: 500;
  margin-right: 6px;
  margin-bottom: 4px;
}
.chip {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  color: var(--ink-soft);
  padding: 7px 14px;
  border-radius: 100px;
  font-size: 13px;
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.chip:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
  transform: translateY(-1px);
}
.chip.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
  box-shadow: 0 2px 6px rgba(180,55,90,0.18);
}
.chip .count {
  font-size: 11px;
  opacity: 0.65;
  font-weight: 400;
}

/* TABS */
.tabs {
  display: flex;
  gap: 6px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 22px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 0;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  background: none;
  border: none;
  padding: 13px 18px 11px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  color: var(--ink-muted);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -1px;
  transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
  white-space: nowrap;
  letter-spacing: -0.005em;
  border-radius: 0;
}
.tab:hover {
  color: var(--ink);
  background: var(--bg-soft);
}
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 600;
}

/* RESULTS COUNT */
.results-meta {
  font-size: 12px;
  color: var(--ink-muted);
  margin-bottom: 16px;
  letter-spacing: 0.02em;
}

/* RECIPE GRID */
.recipe-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

/* RECIPE CARD */
.recipe-card {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: var(--r-lg);
  padding: 22px 22px 18px;
  position: relative;
  transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: var(--shadow-soft);
  display: flex;
  flex-direction: column;
  cursor: pointer;
  overflow: hidden;
}
.recipe-card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 3px;
  background: var(--accent);
  transform: translateY(-3px);
  transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1);
}
.recipe-card:hover {
  border-color: var(--accent-line);
  box-shadow: var(--shadow-card);
  transform: translateY(-2px);
}
.recipe-card:hover::before {
  transform: translateY(0);
}
/* Per-chapter color theming */
.recipe-card[data-chapter="1"]::before { background: var(--warm); }
.recipe-card[data-chapter="1"] .recipe-chapter { color: var(--warm); }
.recipe-card[data-chapter="1"]:hover { border-color: var(--warm); }

.recipe-card[data-chapter="2"]::before { background: var(--ocean); }
.recipe-card[data-chapter="2"] .recipe-chapter { color: var(--ocean); }
.recipe-card[data-chapter="2"]:hover { border-color: var(--ocean); }

.recipe-card[data-chapter="3"]::before { background: var(--honey); }
.recipe-card[data-chapter="3"] .recipe-chapter { color: var(--honey); }
.recipe-card[data-chapter="3"]:hover { border-color: var(--honey); }

.recipe-card[data-chapter="4"]::before { background: var(--sage); }
.recipe-card[data-chapter="4"] .recipe-chapter { color: var(--sage); }
.recipe-card[data-chapter="4"]:hover { border-color: var(--sage); }

.recipe-card[data-chapter="5"]::before { background: var(--accent); }
.recipe-card[data-chapter="5"] .recipe-chapter { color: var(--accent); }
.recipe-card[data-chapter="5"]:hover { border-color: var(--accent); }

.recipe-card-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 8px;
}
.recipe-chapter {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--accent);
  font-weight: 700;
}
.fav-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 22px;
  color: var(--ink-muted);
  padding: 4px;
  margin: -4px -4px 0 0;
  line-height: 1;
  transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
}
.fav-btn:hover {
  transform: scale(1.2) rotate(8deg);
  color: var(--honey);
}
.fav-btn.active {
  color: var(--honey);
  text-shadow: 0 0 12px rgba(217,164,65,0.4);
}
.recipe-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 20px;
  line-height: 1.22;
  letter-spacing: -0.015em;
  color: var(--ink);
  margin-bottom: 4px;
}
.recipe-sub {
  font-size: 12px;
  color: var(--ink-muted);
  font-style: italic;
  margin-bottom: 14px;
}
.ingredients-list {
  list-style: none;
  font-size: 13.5px;
  color: var(--ink-soft);
  margin-bottom: 12px;
}
.ingredient {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
  padding: 6px 8px;
  border-bottom: 1px dashed var(--rule-soft);
  transition: all 0.15s;
  cursor: pointer;
  margin: 0 -8px;
  border-radius: 6px;
}
.ingredient:last-child { border-bottom: none; }
.ingredient:hover {
  background: var(--bg-soft);
  padding-left: 12px;
}
.ingredient.in-cart {
  background: var(--pop-soft);
  border-bottom-color: transparent;
}
.ingredient.in-cart .ing-name {
  color: var(--accent-hover);
  font-weight: 600;
  position: relative;
}
.ingredient.in-cart .ing-name::before {
  content: "✓ ";
  color: var(--pop);
  font-weight: 700;
}
.ingredient.in-cart .ing-qty { color: var(--accent-hover); }
.ing-name {
  color: var(--ink);
  flex: 1;
}
.ing-qty {
  color: var(--ink-muted);
  font-variant-numeric: tabular-nums;
  font-weight: 500;
  white-space: nowrap;
  text-align: right;
}
.ing-qty .scaled {
  color: var(--pop);
  font-weight: 700;
  background: var(--pop-soft);
  padding: 1px 6px;
  border-radius: 4px;
}
:root[data-theme="dark"] .ing-qty .scaled {
  color: var(--pop);
  background: var(--pop-soft);
}

/* NOTES */
.recipe-notes {
  font-size: 12.5px;
  color: var(--ink-soft);
  border-top: 1px solid var(--rule-soft);
  padding-top: 12px;
  margin-top: auto;
}
.recipe-note {
  font-style: italic;
  margin-bottom: 4px;
  line-height: 1.5;
}
.recipe-note .arrow {
  color: var(--accent);
  font-style: normal;
  margin-right: 4px;
  font-weight: 700;
}
.recipe-note-bullet { margin-left: 14px; position: relative; }
.recipe-note-bullet::before {
  content: "•";
  color: var(--pop);
  position: absolute;
  left: -14px;
  font-weight: 700;
}

/* SCALE BAR */
.scale-bar {
  margin-top: 14px;
  padding: 10px 12px;
  background: var(--bg-soft);
  border-radius: var(--r-sm);
  display: flex;
  gap: 4px;
  align-items: center;
  flex-wrap: wrap;
}
.scale-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-muted);
  font-weight: 700;
  margin-right: auto;
}
.scale-btn {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  color: var(--ink-soft);
  padding: 5px 12px;
  font-size: 12px;
  border-radius: 100px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 600;
  transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
  min-width: 40px;
  font-variant-numeric: tabular-nums;
}
.scale-btn:hover {
  color: var(--accent);
  border-color: var(--accent);
}
.scale-btn.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
  box-shadow: 0 2px 4px rgba(180,55,90,0.2);
}

/* RULES PANEL */
.rules-section {
  background: var(--bg-card);
  border: 1px solid var(--rule);
  border-radius: var(--r-lg);
  padding: 28px 28px 24px;
  margin-bottom: 24px;
  box-shadow: var(--shadow-soft);
}
.rules-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 24px;
  margin-top: 18px;
}
.rules-group h3 {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 17px;
  margin-bottom: 10px;
  color: var(--ink);
}
.rules-group ul { list-style: none; font-size: 13px; color: var(--ink-soft); }
.rules-group li { padding: 5px 0; line-height: 1.5; }
.rules-group li strong { color: var(--ink); font-weight: 600; }

.section-eyebrow {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 8px;
}
.section-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 26px;
  letter-spacing: -0.01em;
  color: var(--ink);
}

/* CART DRAWER */
.cart-drawer {
  position: fixed;
  top: 0;
  right: -480px;
  width: 100%;
  max-width: 440px;
  height: 100vh;
  background: var(--bg-card);
  border-left: 1px solid var(--rule);
  box-shadow: -10px 0 40px rgba(0,0,0,0.1);
  transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 200;
  display: flex;
  flex-direction: column;
}
.cart-drawer.open { right: 0; }
.cart-header {
  padding: 24px 24px 16px;
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.cart-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 22px;
  color: var(--ink);
}
.cart-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px 24px 24px;
}
.cart-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--ink-muted);
  font-size: 14px;
}
.cart-empty-icon {
  font-size: 40px;
  margin-bottom: 12px;
  opacity: 0.4;
}
.cart-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--rule-soft);
  gap: 12px;
}
.cart-item-info { flex: 1; }
.cart-item-name { font-size: 14px; color: var(--ink); font-weight: 500; }
.cart-item-qty { font-size: 12px; color: var(--ink-muted); font-style: italic; }
.cart-item-from { font-size: 11px; color: var(--ink-muted); margin-top: 2px; }
.cart-remove {
  background: none;
  border: none;
  color: var(--ink-muted);
  cursor: pointer;
  font-size: 18px;
  padding: 4px 8px;
  border-radius: 4px;
}
.cart-remove:hover { color: var(--accent); background: var(--accent-soft); }
.cart-footer {
  padding: 16px 24px 24px;
  border-top: 1px solid var(--rule);
  display: flex;
  gap: 10px;
}
.cart-footer button {
  flex: 1;
  padding: 10px;
  border-radius: var(--r-md);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--rule);
  background: var(--bg-soft);
  color: var(--ink);
  transition: all 0.15s;
}
.cart-footer button:hover { border-color: var(--accent-line); color: var(--accent); }
.cart-footer button.primary {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.cart-footer button.primary:hover { background: var(--accent-hover); }
.scrim {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 150;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s;
}
.scrim.open { opacity: 1; visibility: visible; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--ink);
  color: var(--bg);
  padding: 12px 20px;
  border-radius: var(--r-md);
  font-size: 14px;
  font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 300;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* PRINT */
@media print {
  .masthead, .search-bar, .filters-section, .tabs, .hero,
  .cart-drawer, .scrim, .toast, .scale-bar, .fav-btn { display: none !important; }
  body { background: white; padding: 0; }
  .recipe-card {
    break-inside: avoid;
    page-break-inside: avoid;
    border: 1px solid #ccc;
    box-shadow: none;
    margin-bottom: 12px;
  }
  .recipe-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
}

/* MOBILE */
@media (max-width: 600px) {
  body { font-size: 14px; padding-bottom: 80px; }
  .masthead { padding: 16px 16px 12px; }
  .brand-title { font-size: 22px; }
  .brand-sub { display: none; }
  .container { padding: 12px 16px; }
  .hero { padding: 22px 20px 18px; }
  .recipe-grid { grid-template-columns: 1fr; gap: 12px; }
  .recipe-card { padding: 18px 18px 14px; }
  .rules-section { padding: 20px; }
  .cart-drawer { max-width: 100%; right: -100%; }
}

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--ink-muted);
}
.empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-state-title {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--ink);
  margin-bottom: 8px;
}
.empty-state-text { font-size: 14px; max-width: 320px; margin: 0 auto; }

/* ANIMATION */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.recipe-card { animation: fadeUp 0.3s ease-out backwards; }
</style>
</head>

/* ============= STATE ============= */
const state = {
  search: '',
  chapter: 0,        // 0 = all, otherwise chapter index
  month: 'all',
  view: 'all',       // 'all' | 'favs'
  favs: new Set(JSON.parse(localStorage.getItem('cookbook.favs') || '[]')),
  cart: JSON.parse(localStorage.getItem('cookbook.cart') || '[]'),
  scales: JSON.parse(localStorage.getItem('cookbook.scales') || '{}'),
  theme: localStorage.getItem('cookbook.theme') || 'light',
};

document.documentElement.setAttribute('data-theme', state.theme);

const CHAPTER_ICONS = { 1: '🍳', 2: '🍲', 3: '🍯', 4: '🥗', 5: '🎄' };
const CHAPTER_NAMES = {};
for (const r of DATA.recipes) {
  if (!CHAPTER_NAMES[r.chapterIdx]) {
    CHAPTER_NAMES[r.chapterIdx] = r.chapter.replace(/^[^\wА-Яа-я]+/, '');
  }
}

/* ============= HELPERS ============= */
function persist() {
  localStorage.setItem('cookbook.favs', JSON.stringify([...state.favs]));
  localStorage.setItem('cookbook.cart', JSON.stringify(state.cart));
  localStorage.setItem('cookbook.scales', JSON.stringify(state.scales));
  localStorage.setItem('cookbook.theme', state.theme);
}

function formatNum(n) {
  // Friendly number formatting: ½, ¼, ¾ for common fractions; otherwise round
  if (Number.isInteger(n)) return String(n);
  const fracs = [[0.125, '⅛'], [0.25, '¼'], [0.333, '⅓'], [0.5, '½'], [0.666, '⅔'], [0.75, '¾']];
  const whole = Math.floor(n);
  const rest = n - whole;
  for (const [val, sym] of fracs) {
    if (Math.abs(rest - val) < 0.04) {
      return whole > 0 ? whole + sym : sym;
    }
  }
  // Round to sensible precision
  if (n < 1) return n.toFixed(2).replace(/\.?0+$/, '').replace('.', ',');
  if (n < 10) return n.toFixed(1).replace(/\.?0+$/, '').replace('.', ',');
  return Math.round(n).toString();
}

function renderQty(parsed, scale) {
  if (!parsed || !parsed.tokens) return '';
  let html = '';
  for (const tok of parsed.tokens) {
    if (tok.kind === 'text') {
      html += escapeHtml(tok.text);
    } else {
      // qty
      const lo = tok.rangeLo;
      const hi = tok.rangeHi;
      let qtyStr;
      if (lo != null && hi != null) {
        qtyStr = formatNum(lo * scale) + '–' + formatNum(hi * scale);
      } else {
        qtyStr = formatNum(tok.value * scale);
      }
      const cls = scale !== 1 ? 'scaled' : '';
      html += `<span class="${cls}">${qtyStr}${tok.unit ? ' ' + escapeHtml(tok.unit) : ''}</span>`;
    }
  }
  return html;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function getScale(recipeId) {
  return state.scales[recipeId] || 1;
}

function setScale(recipeId, scale) {
  if (scale === 1) delete state.scales[recipeId];
  else state.scales[recipeId] = scale;
  persist();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ============= FILTERING ============= */
function filteredRecipes() {
  const q = state.search.trim().toLowerCase();
  return DATA.recipes.filter(r => {
    if (state.view === 'favs' && !state.favs.has(r.id)) return false;
    if (state.chapter && r.chapterIdx !== state.chapter) return false;
    if (state.month !== 'all' && r.month !== state.month) return false;
    if (q && !r.searchText.includes(q)) return false;
    return true;
  });
}

function availableMonths() {
  // Months that exist for the currently selected chapter (or all)
  const months = new Set();
  for (const r of DATA.recipes) {
    if (state.view === 'favs' && !state.favs.has(r.id)) continue;
    if (state.chapter && r.chapterIdx !== state.chapter) continue;
    months.add(r.month);
  }
  return [...months];
}

/* ============= RENDERING ============= */
function renderChapterTabs() {
  const container = document.getElementById('chapter-tabs');
  const chapters = [{ idx: 0, name: 'Всички', icon: '◉' }];
  for (const idx of Object.keys(CHAPTER_NAMES).map(Number).sort()) {
    chapters.push({ idx, name: CHAPTER_NAMES[idx], icon: CHAPTER_ICONS[idx] || '•' });
  }
  if (state.view === 'favs') {
    chapters[0].name = 'Любими';
  }
  container.innerHTML = chapters.map(c =>
    `<button class="tab ${state.chapter === c.idx ? 'active' : ''}" data-ch="${c.idx}">
       <span style="margin-right:6px">${c.icon}</span>${escapeHtml(c.name)}
     </button>`
  ).join('');
  container.querySelectorAll('.tab').forEach(btn => {
    btn.onclick = () => {
      state.chapter = parseInt(btn.dataset.ch, 10);
      state.month = 'all';
      render();
    };
  });
}

function renderMonthFilter() {
  const months = availableMonths();
  const container = document.getElementById('month-filter');
  if (months.length <= 1) { container.innerHTML = ''; return; }
  let html = `<span class="filter-label">Месец</span>`;
  html += `<button class="chip ${state.month === 'all' ? 'active' : ''}" data-m="all">Всички</button>`;
  for (const m of months) {
    html += `<button class="chip ${state.month === m ? 'active' : ''}" data-m="${escapeHtml(m)}">${escapeHtml(m)}</button>`;
  }
  container.innerHTML = html;
  container.querySelectorAll('.chip').forEach(btn => {
    btn.onclick = () => { state.month = btn.dataset.m; render(); };
  });
}

function renderRules() {
  const grid = document.getElementById('rules-grid');
  grid.innerHTML = DATA.rules.map(group => `
    <div class="rules-group">
      <h3>${escapeHtml(group.title)}</h3>
      <ul>${group.items.map(item => `<li>${renderInlineBold(item)}</li>`).join('')}</ul>
    </div>
  `).join('');
}

function renderInlineBold(text) {
  return escapeHtml(text)
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>');
}

function renderRecipes() {
  const list = filteredRecipes();
  const grid = document.getElementById('recipe-grid');
  const meta = document.getElementById('results-meta');

  if (list.length === 0) {
    grid.innerHTML = '';
    document.getElementById('recipes-container').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🍃</div>
        <div class="empty-state-title">Нищо не намерих</div>
        <div class="empty-state-text">Опитай с друга дума или махни някой филтър.</div>
      </div>`;
    meta.textContent = '';
    return;
  }
  document.getElementById('recipes-container').innerHTML = `<div class="recipe-grid" id="recipe-grid"></div>`;
  const grid2 = document.getElementById('recipe-grid');
  meta.textContent = `Показани ${list.length} рецепти`;

  grid2.innerHTML = list.map((r, i) => renderCard(r, i)).join('');
  attachCardEvents();
}

function renderCard(r, i) {
  const scale = getScale(r.id);
  const isFav = state.favs.has(r.id);
  const scales = [0.5, 1, 1.5, 2];

  const ingredientsHtml = r.ingredients.map((ing, idx) => {
    const inCart = state.cart.some(c => c.recipeId === r.id && c.ingIdx === idx);
    return `
      <li class="ingredient ${inCart ? 'in-cart' : ''}" data-recipe="${r.id}" data-idx="${idx}">
        <span class="ing-name">${escapeHtml(ing.name)}</span>
        <span class="ing-qty">${renderQty(ing.parsed, scale)}</span>
      </li>`;
  }).join('');

  const notesHtml = (r.notes || []).filter(n => n && n !== '---').map(n => {
    if (n.startsWith('👉')) {
      return `<div class="recipe-note"><span class="arrow">▸</span>${escapeHtml(n.replace(/^👉\s*/, ''))}</div>`;
    }
    if (/^-\s/.test(n)) {
      return `<div class="recipe-note recipe-note-bullet">${renderInlineBold(n.replace(/^-\s/, ''))}</div>`;
    }
    return `<div class="recipe-note">${renderInlineBold(n)}</div>`;
  }).join('');

  return `
    <article class="recipe-card" data-id="${r.id}" data-chapter="${r.chapterIdx}" style="animation-delay:${Math.min(i * 30, 300)}ms">
      <div class="recipe-card-head">
        <div>
          <div class="recipe-chapter">${CHAPTER_ICONS[r.chapterIdx] || ''} ${escapeHtml(CHAPTER_NAMES[r.chapterIdx])} · ${escapeHtml(r.month)}</div>
        </div>
        <button class="fav-btn ${isFav ? 'active' : ''}" data-fav="${r.id}" title="Добави в любими">${isFav ? '★' : '☆'}</button>
      </div>
      <h3 class="recipe-title">${escapeHtml(r.title)}</h3>
      ${r.subtitle ? `<div class="recipe-sub">${escapeHtml(r.subtitle)}${r.date ? ' · ' + escapeHtml(r.date) : ''}</div>` : ''}
      <ul class="ingredients-list">${ingredientsHtml}</ul>
      ${notesHtml ? `<div class="recipe-notes">${notesHtml}</div>` : ''}
      <div class="scale-bar">
        <span class="scale-label">Порции</span>
        ${scales.map(s => `<button class="scale-btn ${s === scale ? 'active' : ''}" data-scale-recipe="${r.id}" data-scale="${s}">×${s}</button>`).join('')}
      </div>
    </article>`;
}

function attachCardEvents() {
  // Favorites
  document.querySelectorAll('[data-fav]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const id = btn.dataset.fav;
      if (state.favs.has(id)) state.favs.delete(id);
      else state.favs.add(id);
      persist();
      updateBadges();
      render();
    };
  });

  // Scale
  document.querySelectorAll('[data-scale]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const id = btn.dataset.scaleRecipe;
      const s = parseFloat(btn.dataset.scale);
      setScale(id, s);
      render();
    };
  });

  // Ingredient → cart toggle
  document.querySelectorAll('.ingredient').forEach(li => {
    li.onclick = (e) => {
      e.stopPropagation();
      const rid = li.dataset.recipe;
      const idx = parseInt(li.dataset.idx, 10);
      const recipe = DATA.recipes.find(r => r.id === rid);
      const ing = recipe.ingredients[idx];
      const existing = state.cart.findIndex(c => c.recipeId === rid && c.ingIdx === idx);
      if (existing >= 0) {
        state.cart.splice(existing, 1);
      } else {
        const scale = getScale(rid);
        state.cart.push({
          recipeId: rid,
          ingIdx: idx,
          name: ing.name,
          qty: renderQtyPlain(ing.parsed, scale),
          recipeTitle: recipe.title,
        });
      }
      persist();
      updateBadges();
      // Update just this card visually without full re-render
      li.classList.toggle('in-cart');
      renderCart();
    };
  });
}

function renderQtyPlain(parsed, scale) {
  if (!parsed || !parsed.tokens) return '';
  let s = '';
  for (const tok of parsed.tokens) {
    if (tok.kind === 'text') s += tok.text;
    else {
      const lo = tok.rangeLo, hi = tok.rangeHi;
      const q = (lo != null && hi != null)
        ? formatNum(lo * scale) + '–' + formatNum(hi * scale)
        : formatNum(tok.value * scale);
      s += q + (tok.unit ? ' ' + tok.unit : '');
    }
  }
  return s;
}

function updateBadges() {
  const cartBadge = document.getElementById('cart-badge');
  cartBadge.textContent = state.cart.length;
  cartBadge.style.display = state.cart.length ? 'flex' : 'none';
  const favBadge = document.getElementById('fav-badge');
  favBadge.textContent = state.favs.size;
  favBadge.style.display = state.favs.size ? 'flex' : 'none';
}

function renderCart() {
  const body = document.getElementById('cart-body');
  if (state.cart.length === 0) {
    body.innerHTML = `
      <div class="cart-empty">
        <div class="cart-empty-icon">🛒</div>
        <div>Списъкът е празен.</div>
        <div style="font-size:12px; margin-top:8px">Натисни съставка от която и да е рецепта, за да я добавиш.</div>
      </div>`;
    return;
  }
  // Group by ingredient name (case-insensitive)
  const grouped = {};
  for (const item of state.cart) {
    const key = item.name.toLowerCase().trim();
    if (!grouped[key]) grouped[key] = { name: item.name, parts: [] };
    grouped[key].parts.push({ qty: item.qty, from: item.recipeTitle });
  }
  body.innerHTML = Object.values(grouped).map(g => `
    <div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${escapeHtml(g.name)}</div>
        <div class="cart-item-qty">${g.parts.map(p => escapeHtml(p.qty)).join(' + ')}</div>
        <div class="cart-item-from">от: ${escapeHtml(g.parts.map(p => p.from).join(', '))}</div>
      </div>
      <button class="cart-remove" data-remove="${escapeHtml(g.name)}" title="Махни">✕</button>
    </div>
  `).join('');
  body.querySelectorAll('[data-remove]').forEach(btn => {
    btn.onclick = () => {
      const name = btn.dataset.remove;
      state.cart = state.cart.filter(c => c.name !== name);
      persist();
      updateBadges();
      renderCart();
      render();
    };
  });
}

function openCart() {
  document.getElementById('cart-drawer').classList.add('open');
  document.getElementById('scrim').classList.add('open');
  renderCart();
}
function closeCart() {
  document.getElementById('cart-drawer').classList.remove('open');
  document.getElementById('scrim').classList.remove('open');
}

/* ============= MAIN RENDER ============= */
function render() {
  renderChapterTabs();
  renderMonthFilter();
  renderRecipes();
  updateBadges();
}

/* ============= EVENT WIRING ============= */
document.getElementById('search').addEventListener('input', (e) => {
  state.search = e.target.value;
  renderRecipes();
});

document.getElementById('btn-theme').onclick = () => {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', state.theme);
  persist();
};

document.getElementById('btn-rules').onclick =
document.getElementById('hero-rules').onclick = () => {
  const sec = document.getElementById('rules-section');
  const shown = sec.style.display !== 'none';
  sec.style.display = shown ? 'none' : 'block';
  if (!shown) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
};

document.getElementById('btn-random').onclick =
document.getElementById('hero-random').onclick = () => {
  const list = filteredRecipes();
  if (!list.length) {
    // Try with no filter
    const all = DATA.recipes;
    if (!all.length) return;
    const r = all[Math.floor(Math.random() * all.length)];
    toast(`🎲 ${r.title}`);
  } else {
    const r = list[Math.floor(Math.random() * list.length)];
    toast(`🎲 ${r.title}`);
    // Scroll to that card
    setTimeout(() => {
      const el = document.querySelector(`[data-id="${r.id}"]`);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.style.transition = 'box-shadow 0.3s';
        el.style.boxShadow = '0 0 0 3px var(--accent)';
        setTimeout(() => { el.style.boxShadow = ''; }, 1500);
      }
    }, 100);
  }
};

document.getElementById('btn-favs').onclick = () => {
  state.view = state.view === 'favs' ? 'all' : 'favs';
  document.getElementById('btn-favs').classList.toggle('active', state.view === 'favs');
  state.chapter = 0;
  state.month = 'all';
  render();
};

document.getElementById('btn-cart').onclick = openCart;
document.getElementById('cart-close').onclick = closeCart;
document.getElementById('scrim').onclick = closeCart;

document.getElementById('cart-clear').onclick = () => {
  if (state.cart.length === 0) return;
  if (confirm('Да изчистя ли списъка?')) {
    state.cart = [];
    persist();
    updateBadges();
    renderCart();
    render();
  }
};

document.getElementById('cart-copy').onclick = () => {
  if (state.cart.length === 0) return;
  const grouped = {};
  for (const item of state.cart) {
    const key = item.name.toLowerCase().trim();
    if (!grouped[key]) grouped[key] = { name: item.name, parts: [] };
    grouped[key].parts.push(item.qty);
  }
  const lines = ['🛒 Списък за пазар', ''];
  for (const g of Object.values(grouped)) {
    lines.push(`• ${g.name} — ${g.parts.join(' + ')}`);
  }
  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    toast('✓ Копирано в clipboard');
  }).catch(() => {
    // Fallback: show in prompt
    prompt('Копирай ръчно:', text);
  });
};

document.getElementById('cart-print').onclick = () => {
  if (state.cart.length === 0) return;
  const grouped = {};
  for (const item of state.cart) {
    const key = item.name.toLowerCase().trim();
    if (!grouped[key]) grouped[key] = { name: item.name, parts: [] };
    grouped[key].parts.push(item.qty);
  }
  const html = `
    <html><head><title>Списък за пазар</title>
    <style>
      body { font-family: Georgia, serif; max-width: 500px; margin: 40px auto; padding: 20px; color: #1a1814; }
      h1 { font-size: 24px; margin-bottom: 20px; border-bottom: 2px solid #B8421A; padding-bottom: 8px; }
      ul { list-style: none; padding: 0; }
      li { padding: 8px 0; border-bottom: 1px dashed #ccc; display: flex; justify-content: space-between; }
      .qty { color: #666; font-style: italic; margin-left: 16px; }
      input[type=checkbox] { margin-right: 8px; }
    </style></head><body>
    <h1>🛒 Списък за пазар</h1>
    <ul>
      ${Object.values(grouped).map(g => `
        <li><span><input type="checkbox"> ${escapeHtml(g.name)}</span><span class="qty">${escapeHtml(g.parts.join(' + '))}</span></li>
      `).join('')}
    </ul>
    </body></html>`;
  const w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
  setTimeout(() => w.print(), 200);
};

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === '/' || (e.key === 'k' && (e.ctrlKey || e.metaKey))) {
    e.preventDefault();
    document.getElementById('search').focus();
  }
  if (e.key === 'r' && !e.ctrlKey && !e.metaKey) {
    document.getElementById('btn-random').click();
  }
  if (e.key === 'Escape') closeCart();
});

/* ============= GO ============= */
renderRules();
render();
</script>

</body>
</html>
